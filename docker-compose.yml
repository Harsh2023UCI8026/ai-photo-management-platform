services:

  postgres:
    image: postgres:16

    container_name: postgres

    environment:
      POSTGRES_DB: photo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis

    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: api

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    volumes:
      - uploads_data:/app/uploads
      - thumbnails_data:/app/thumbnails

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile

    container_name: worker

    depends_on:
      - redis

    volumes:
      - uploads_data:/app/uploads
      - thumbnails_data:/app/thumbnails

volumes:
  postgres_data:
  uploads_data:
  thumbnails_data: